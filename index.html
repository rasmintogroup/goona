<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Goona AI - Chat Ala WA</title>
    <style>
        :root {
            --primary-brown: #8B4513;
            --secondary-brown: #A0522D;
            --light-brown: #D2B48C;
            --bg-brown: #FDF5E6;
            --user-bubble: #6D4C41; 
        }

        * { box-sizing: border-box; }

        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-brown);
        }

        #app { display: flex; flex-direction: column; height: 100vh; }
        
        header { 
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; 
            background: #fff; border-bottom: 1px solid var(--light-brown); z-index: 10;
        }
        
        .logo { font-weight: bold; color: var(--primary-brown); font-size: 18px; }
        
        #chat-window { 
            flex: 1; overflow-y: auto; padding: 20px 15px; 
            display: flex; flex-direction: column; 
            gap: 15px; 
        }
        
        .ai-msg, .user-msg { 
            max-width: 80%; padding: 10px 15px; font-size: 14px; line-height: 1.5;
            position: relative; word-wrap: break-word;
        }
        
        .ai-msg { 
            background: #fff; align-self: flex-start; 
            border-radius: 0 15px 15px 15px; 
            border: 1px solid var(--light-brown);
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        
        .user-msg { 
            background: var(--user-bubble); color: #fff; 
            align-self: flex-end; 
            text-align: left; 
            border-radius: 15px 0 15px 15px; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .input-container { 
            padding: 10px 15px; background: #fff; border-top: 1px solid var(--light-brown);
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }

        .input-wrapper { max-width: 600px; margin: 0 auto; display: flex; gap: 8px; align-items: center; }
        
        input { 
            flex: 1; padding: 12px 18px; border-radius: 25px; 
            border: 1px solid var(--light-brown); outline: none; 
            font-size: 14px; background: #FFFAF0;
        }
        
        button { 
            background: var(--primary-brown); color: #fff; border: none; 
            padding: 10px 20px; border-radius: 25px; cursor: pointer; 
            font-weight: bold; font-size: 13px;
        }
        
        .btn-post { 
            text-decoration: none; background: var(--secondary-brown); color: #fff; 
            padding: 6px 12px; border-radius: 15px; font-size: 11px; font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <div class="logo">GOONA AI</div>
            <a href="tambah-info.html" class="btn-post">+ Pasang Info</a>
        </header>

        <main id="chat-window">
            <div id="chat-history" style="display: flex; flex-direction: column; gap: 15px;">
                <div class="ai-msg">Halo Cik/Bang! Saya AI Goona. Mau cari loker, jasa, atau info apa di Kepri hari ini? 😊</div>
            </div>
        </main>

        <div class="input-container">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Tanya di sini...">
                <button id="send-btn">Tanya</button>
            </div>
        </div>
    </div>

    <!-- Bagian HTML dan CSS tetap sama sesuai kode abang -->
<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

    // Konfigurasi API
    const OPENROUTER_KEY = "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"; 
    const SUPABASE_URL = 'https://ejnuelaqlgfcmcqpxmpa.supabase.co'; 
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqbnVlbGFxbGdmY21jcXB4bXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MzIzMjcsImV4cCI6MjA5MzMwODMyN30.32tG2nN1a3cDa6M__qe7PNWG5ZzeF7zs1eDZSxXviNM';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const inputField = document.getElementById('user-input');
    const chatHistory = document.getElementById('chat-history');
    const chatWindow = document.getElementById('chat-window');

    async function tanyaAI() {
        const prompt = inputField.value.trim();
        if (!prompt) return;

        appendMessage(prompt, 'user-msg');
        inputField.value = '';

        const loadingDiv = appendMessage("Sabar ya Cik, lagi dicari...", 'ai-msg');

        try {
            // 1. Ambil data dari Supabase
            const { data, error } = await supabase
                .from('konten_goona')
                .select('*')
                .eq('status', 'aktif'); 

            if (error) throw error;
            const contextData = JSON.stringify(data.slice(0, 20));
            
            // 2. Konfigurasi OpenRouter (Menggantikan Jalur Gemini Langsung)
            const URL = "https://openrouter.ai/api/v1/chat/completions";
            
            const systemInstruction = `Kamu adalah AI Goona, asisten lokal Kepri. 
            Data referensi: ${contextData}. 
            Aturan: 
            1. Sapa dengan 'Cik' atau 'Bang'. Jawab santai ala orang Kepri.
            2. Jika ada di data, berikan detail dan nomor WA-nya. Jika tidak, ajak pasang info sendiri.
            3. Di akhir jawaban, tambahkan kalimat: "Informasi ini disampaikan dengan benar dan dapat dipertanggungjawabkan agar Goona juga aman ke depannya."`;

            const requestBody = {
                "model": "meta-llama/llama-3-8b-instruct:free", // Menggunakan model gratis dari OpenRouter
                "messages": [
                    { "role": "system", "content": systemInstruction },
                    { "role": "user", "content": prompt }
                ]
            };

            const response = await fetch(URL, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${OPENROUTER_KEY}`
                },
                body: JSON.stringify(requestBody)
            });

            const hasilJSON = await response.json();
            loadingDiv.remove();

            // Pengecekan keamanan respon (Perbaikan dari kode abang yang typo)
            if (hasilJSON.choices && hasilJSON.choices.length > 0) {
                const aiText = hasilJSON.choices[0].message.content;
                appendMessage(aiText, 'ai-msg');
            } else {
                console.error("Respons AI error:", hasilJSON);
                appendMessage("Waduh Cik, sepertinya AI-nya lagi istirahat sebentar. Coba lagi ya.", 'ai-msg');
            }

        } catch (err) {
            console.error("Error Detail:", err);
            if(loadingDiv) loadingDiv.remove();
            appendMessage("Waduh Cik, koneksi terputus. Coba refresh halamannya ya.", 'ai-msg');
        }
    }

    function appendMessage(text, className) {
        const div = document.createElement('div');
        div.className = className;
        div.innerText = text;
        chatHistory.appendChild(div);
        chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
        return div;
    }

    const sendBtn = document.getElementById('send-btn');
    if (sendBtn) {
        sendBtn.onclick = (e) => {
            e.preventDefault();
            tanyaAI();
        };
    }

    if (inputField) {
        inputField.onkeydown = (e) => { 
            if (e.key === 'Enter') {
                e.preventDefault();
                tanyaAI(); 
            }
        };
    }

    window.tanyaAI = tanyaAI;
</script>
