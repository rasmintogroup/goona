<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Goona AI - Chat Ala WA</title>
    <link rel="Pavicon_goona.png" href="data:,">
    <style>
        :root {
            --primary-brown: #8B4513;
            --secondary-brown: #A0522D;
            --light-brown: #D2B48C;
            --bg-brown: #FDF5E6;
            --user-bubble: #6D4C41; 
        }

        * { box-sizing: border-box; }

        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-brown);
        }

        #app { display: flex; flex-direction: column; height: 100vh; }
        
        header { 
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; 
            background: #fff; border-bottom: 1px solid var(--light-brown); z-index: 10;
        }
        
        .logo { font-weight: bold; color: var(--primary-brown); font-size: 18px; }
        
        #chat-window { 
            flex: 1; overflow-y: auto; padding: 20px 15px; 
            display: flex; flex-direction: column; 
            gap: 15px; 
        }
        
        .ai-msg, .user-msg { 
            max-width: 80%; padding: 10px 15px; font-size: 14px; line-height: 1.5;
            position: relative; word-wrap: break-word;
        }
        
        .ai-msg { 
            background: #fff; align-self: flex-start; 
            border-radius: 0 15px 15px 15px; 
            border: 1px solid var(--light-brown);
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        
        .user-msg { 
            background: var(--user-bubble); color: #fff; 
            align-self: flex-end; 
            text-align: left; 
            border-radius: 15px 0 15px 15px; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .input-container { 
            padding: 10px 15px; background: #fff; border-top: 1px solid var(--light-brown);
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }

        .input-wrapper { max-width: 600px; margin: 0 auto; display: flex; gap: 8px; align-items: center; }
        
        input { 
            flex: 1; padding: 12px 18px; border-radius: 25px; 
            border: 1px solid var(--light-brown); outline: none; 
            font-size: 14px; background: #FFFAF0;
        }
        
        button { 
            background: var(--primary-brown); color: #fff; border: none; 
            padding: 10px 20px; border-radius: 25px; cursor: pointer; 
            font-weight: bold; font-size: 13px;
        }
        
        .btn-post { 
            text-decoration: none; background: var(--secondary-brown); color: #fff; 
            padding: 6px 12px; border-radius: 15px; font-size: 11px; font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <div class="logo">GOONA AI</div>
            <a href="tambah-info.html" class="btn-post">+ Pasang Info</a>
        </header>

        <main id="chat-window">
            <div id="chat-history" style="display: flex; flex-direction: column; gap: 15px;">
                <div class="ai-msg">Halo Cik/Bang! Saya AI Goona. Mau cari loker, jasa, atau info apa di Kepri hari ini? 😊</div>
            </div>
        </main>

        <div class="input-container">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Tanya di sini...">
                <button id="send-btn">Tanya</button>
            </div>
        </div>
    </div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

// ===============================
// KONFIGURASI
// ===============================
const OPENROUTER_KEY = "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";
const SUPABASE_URL = 'https://ejnuelaqlgfcmcqpxmpa.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqbnVlbGFxbGdmY21jcXB4bXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MzIzMjcsImV4cCI6MjA5MzMwODMyN30.32tG2nN1a3cDa6M__qe7PNWG5ZzeF7zs1eDZSxXviNM';

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ===============================
// ELEMENT
// ===============================
const inputField = document.getElementById('user-input');
const chatHistory = document.getElementById('chat-history');
const chatWindow = document.getElementById('chat-window');
const sendBtn = document.getElementById('send-btn');

// ===============================
// FUNGSI TANYA AI
// ===============================
async function tanyaAI() {

    const prompt = inputField.value.trim();

    if (!prompt) return;

    // tampilkan chat user
    appendMessage(prompt, 'user-msg');

    // kosongkan input
    inputField.value = '';

    // loading
    const loadingDiv = appendMessage(
        "Sabar ya Cik, Goona lagi cari info...",
        'ai-msg'
    );

    try {

        // ===============================
        // AMBIL DATA SUPABASE
        // ===============================
        const { data, error } = await supabase
            .from('konten_goona')
            .select('*')
            .eq('status', 'aktif')
            .limit(20);

        if (error) {
            console.error("Supabase Error:", error);
            throw new Error("Gagal mengambil data Supabase");
        }

        // context untuk AI
        const contextData = JSON.stringify(data || []);

        // ===============================
        // SYSTEM PROMPT
        // ===============================
        const systemInstruction = `
Kamu adalah AI Goona, asisten lokal Kepulauan Riau (Kepri).

DATA REFERENSI:
${contextData}

ATURAN:
1. Sapa pengguna dengan "Cik" atau "Bang".
2. Gunakan gaya santai ala warga Kepri.
3. Jika data tersedia, berikan detail lengkap.
4. Jika ada nomor WA, tampilkan.
5. Jika data tidak ada, arahkan pengguna untuk klik tombol "Pasang Info".
6. Jangan mengarang informasi palsu.
7. Jawaban singkat, jelas, dan ramah.
8. Akhiri jawaban dengan:
"Informasi ini disampaikan dengan benar dan dapat dipertanggungjawabkan agar Goona juga aman ke depannya."
`;

        // ===============================
        // REQUEST KE OPENROUTER
        // ===============================
        const response = await fetch(
            "https://openrouter.ai/api/v1/chat/completions",
            {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${OPENROUTER_KEY}`,
                    'HTTP-Referer': 'https://goona.rasmintogroup.workers.dev',
                    'X-Title': 'Goona AI'
                },
                body: JSON.stringify({
                    model: "z-ai/glm-4.5-air:free",
                    messages: [
                        {
                            role: "system",
                            content: systemInstruction
                        },
                        {
                            role: "user",
                            content: prompt
                        }
                    ],
                    temperature: 0.7,
                    max_tokens: 500
                })
            }
        );

        // cek status response
        if (!response.ok) {

            const errorText = await response.text();

            console.error("HTTP Error:", response.status);
            console.error(errorText);

            throw new Error(
                `Server AI error (${response.status})`
            );
        }

        // convert json
        const hasilJSON = await response.json();

        // hapus loading
        if (loadingDiv) {
            loadingDiv.remove();
        }

        console.log("Respons AI:", hasilJSON);

        // ===============================
        // VALIDASI RESPONSE AI
        // ===============================
        if (
            hasilJSON &&
            hasilJSON.choices &&
            hasilJSON.choices.length > 0 &&
            hasilJSON.choices[0].message &&
            hasilJSON.choices[0].message.content
        ) {

            const aiText =
                hasilJSON.choices[0].message.content;

            appendMessage(aiText, 'ai-msg');

        } else {

            console.error("Format response aneh:", hasilJSON);

            appendMessage(
                "Waduh Cik, Goona lagi pening sebentar 😅",
                'ai-msg'
            );
        }

    } catch (err) {

        console.error("Error Detail:", err);

        // hapus loading kalau ada
        if (loadingDiv) {
            loadingDiv.remove();
        }

        appendMessage(
            "Waduh Cik, terjadi gangguan koneksi atau server 😥",
            'ai-msg'
        );
    }
}

// ===============================
// TAMBAH PESAN KE CHAT
// ===============================
function appendMessage(text, className) {

    const div = document.createElement('div');

    div.className = className;

    div.innerText = text;

    chatHistory.appendChild(div);

    // auto scroll
    chatWindow.scrollTo({
        top: chatWindow.scrollHeight,
        behavior: 'smooth'
    });

    return div;
}

// ===============================
// EVENT BUTTON
// ===============================
if (sendBtn) {

    sendBtn.addEventListener('click', (e) => {

        e.preventDefault();

        tanyaAI();
    });
}

// ===============================
// ENTER KEY
// ===============================
if (inputField) {

    inputField.addEventListener('keydown', (e) => {

        if (e.key === 'Enter') {

            e.preventDefault();

            tanyaAI();
        }
    });
}

// global
window.tanyaAI = tanyaAI;

</script>
