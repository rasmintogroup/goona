<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Goona</title>

    <link rel="icon" type="image/png" href="Pavicon_goona.png">

    <style>
        :root {
            --primary-brown: #8B4513;
            --secondary-brown: #A0522D;
            --light-brown: #D2B48C;
            --bg-brown: #FDF5E6;
            --user-bubble: #6D4C41;
            --wa-green: #25D366;
        }

        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-brown);
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            position: relative;
        }

        header {
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            border-bottom: 1px solid var(--light-brown);
            z-index: 10;
        }

        .logo {
            font-weight: bold;
            color: var(--primary-brown);
            font-size: 18px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .ai-msg,
        .user-msg {
            max-width: 80%;
            padding: 10px 15px;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
            word-wrap: break-word;
        }

        .ai-msg {
            background: #fff;
            align-self: flex-start;
            border-radius: 0 15px 15px 15px;
            border: 1px solid var(--light-brown);
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .user-msg {
            background: var(--user-bubble);
            color: #fff;
            align-self: flex-end;
            text-align: left;
            border-radius: 15px 0 15px 15px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .input-container {
            padding: 10px 15px;
            background: #fff;
            border-top: 1px solid var(--light-brown);
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }

        .input-wrapper {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 25px;
            border: 1px solid var(--light-brown);
            outline: none;
            font-size: 14px;
            background: #FFFAF0;
        }

        button {
            background: var(--primary-brown);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }

        .btn-post {
            text-decoration: none;
            background: var(--secondary-brown);
            color: #fff;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: bold;
        }

        .menu-btn {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 5px;
        }

        .menu-btn span {
            width: 20px;
            height: 3px;
            background: var(--primary-brown);
            border-radius: 2px;
            transition: 0.3s;
        }

        .sidebar {
            position: absolute;
            top: 0;
            right: -260px;
            width: 260px;
            height: 100%;
            background: #fff;
            box-shadow: -2px 0 8px rgba(0,0,0,0.15);
            transition: right 0.3s ease;
            z-index: 99;
            padding: 60px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar.open {
            right: 0;
        }

        .sidebar h3 {
            font-size: 14px;
            color: var(--primary-brown);
            margin: 0 0 5px 0;
            border-bottom: 1px solid var(--light-brown);
            padding-bottom: 5px;
        }

        .sidebar p {
            font-size: 12px;
            color: #666;
            line-height: 1.5;
            margin: 0;
            text-align: justify;
        }

        .card-container {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 15px;
            width: 100%;
            margin: 5px 0;
        }

        .jasa-card {
            background: #fff;
            border: 1px solid var(--light-brown);
            border-left: 5px solid var(--primary-brown);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 320px; 
        }

        /* Border penanda khusus untuk iklan PPV premium */
        .jasa-card.ppv-premium {
            border-left: 5px solid #FFD700; /* Warna Emas */
            box-shadow: 0 2px 8px rgba(255, 215, 0, 0.2);
        }

        .card-title {
            font-weight: bold;
            font-size: 15px;
            color: var(--primary-brown);
            margin-bottom: 6px;
        }

        .card-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #eee;
            display: block;
        }

        .card-desc {
            font-size: 13px;
            color: #444;
            line-height: 1.4;
            margin-bottom: 12px;
            white-space: pre-line;
        }

        .btn-wa {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: var(--wa-green);
            color: #fff;
            text-decoration: none;
            padding: 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            transition: background 0.2s;
        }

        .btn-wa:hover {
            background: #20ba56;
        }

        .loading-msg {
            width: 70px;
            padding: 14px 18px;
        }

        .typing {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #8B4513;
            border-radius: 50%;
            animation: bounce 1.3s infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0.7);
                opacity: 0.5;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

<div id="app">

    <header>
        <div class="logo">GOONA Chat</div>
        <div class="header-right">
            <a href="tambah-info.html" class="btn-post" id="ui-btn-post">+ Pasang Info</a>
            <div class="menu-btn" id="menu-btn">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <div class="sidebar" id="sidebar">
        <h3 id="ui-title-rules">Aturan & Legalitas</h3>
        <p id="ui-text-rules">
            Setiap informasi yang disampaikan di Goona AI wajib berupa informasi yang benar, jujur, akurat, dan dapat dipertanggungjawabkan sepenuhnya oleh pemasang informasi demi kenyamanan dan keamanan hukum bersama.
        </p>
    </div>

    <main id="chat-window">
        <div id="chat-history" style="display:flex; flex-direction:column; gap:15px; width: 100%;">
        </div>
    </main>

    <div class="input-container">
        <div class="input-wrapper">
            <input
                type="text"
                id="user-input"
                placeholder="Tanya di sini..."
            >
            <button id="send-btn">
                Tanya
            </button>
        </div>
    </div>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

import { modul1Variations, modul2Variations, modul3Variations } from './kosakata/sapaan.js';
import { daerahQuestions } from './kosakata/pertanyaan_daerah.js';
import { emosiData } from './kosakata/ekspresi.js';
import { dictionary } from './kosakata/kamus_tetap.js';

const SUPABASE_URL = 'https://ejnuelaqlgfcmcqpxmpa.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqbnVlbGFxbGdmY21jcXB4bXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MzIzMjcsImV4cCI6MjA5MzMwODMyN30.32tG2nN1a3cDa6M__qe7PNWG5ZzeF7zs1eDZSxXviNM';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const inputField = document.getElementById('user-input');
const chatHistory = document.getElementById('chat-history');
const chatWindow = document.getElementById('chat-window');
const sendBtn = document.getElementById('send-btn');
const menuBtn = document.getElementById('menu-btn');
const sidebar = document.getElementById('sidebar');

let userIdentity = {
    nama: localStorage.getItem('goona_nama') || '',
    daerah: localStorage.getItem('goona_daerah') || ''
};
let currentStep = 'normal'; 
const normalPlaceholder = "Gunakan 3 kata (Contoh: kue batam center)...";

function showTypingIndicator() {
    const loadingDiv = document.createElement('div');
    loadingDiv.className = 'ai-msg loading-msg';
    loadingDiv.id = 'typing-indicator';
    loadingDiv.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
    chatHistory.appendChild(loadingDiv);
    chatWindow.scrollTop = chatWindow.scrollHeight;
}

function removeTypingIndicator() {
    const indicator = document.getElementById('typing-indicator');
    if (indicator) indicator.remove();
}

function formatResponseText(text) {
    return text.replace(/\[Nama\]/g, userIdentity.nama).replace(/\[Daerah\]/g, userIdentity.daerah);
}

function initWelcomeMessage() {
    showTypingIndicator();
    
    setTimeout(() => {
        removeTypingIndicator();
        let selectedText = "";
        
        if (!userIdentity.nama || !userIdentity.daerah) {
            selectedText = modul1Variations[Math.floor(Math.random() * modul1Variations.length)];
            currentStep = 'menunggu_nama';
            inputField.placeholder = "Ketik nama panggilan Anda...";
        } else {
            selectedText = modul3Variations[Math.floor(Math.random() * modul3Variations.length)];
            selectedText = formatResponseText(selectedText);
            currentStep = 'normal';
            inputField.placeholder = normalPlaceholder;
        }
        
        appendMessage(selectedText, 'ai-msg');
    }, 1600);
}

function checkEmotionInterception(prompt) {
    const lowerPrompt = prompt.toLowerCase();

    if (emosiData.keywordsA.some(kw => lowerPrompt.includes(kw))) {
        const resA = emosiData.responsesA;
        return formatResponseText(resA[Math.floor(Math.random() * resA.length)]);
    }
    
    if (emosiData.keywordsB.some(kw => lowerPrompt.includes(kw))) {
        const resB = emosiData.responsesB;
        return formatResponseText(resB[Math.floor(Math.random() * resB.length)]);
    }

    if (emosiData.keywordsC.some(kw => new RegExp(`(?<!tidak\\s|kurang\\s|nggak\\s|ngak\\s|gk\\s|gakk\\s|g\\s|ga\\s|ndak\\s|nda\\s|bukan\\s|belum\\s|belom\\s|jangan\\s|tanpa\\s|ogah\\s|anti\\s|gagal\\s|minim\\s|minus\\s|low\\s|bad\\s|kurang\\s|agak\\s|lumayan\\s|dikit\\s|sedikit\\s|jarang\\s|susah\\s|sulit\\s|payah\\s|parah\\s|hampir\\s|nyaris\\s|malah\\s|bukannya\\s|kok\\s|kenapa\\s|mengapa\\s|masa\\s|masak\\s|apanya\\s|sebelah\\s|mana\\s|belah\\s|jauh\\s|asing\\s|aneh\\s|zonk\\s|zero\\s|no\\s|not\\s|never\\s)${kw}`).test(lowerPrompt))) {
        const resC = emosiData.responsesC;
        return formatResponseText(resC[Math.floor(Math.random() * resC.length)]);
    }

    return null;
}

async function tanyaAI() {
    const prompt = inputField.value.trim();
    if (!prompt) return;

    appendMessage(prompt, 'user-msg');
    inputField.value = '';

    if (currentStep === 'menunggu_nama') {
        userIdentity.nama = prompt;
        currentStep = 'menunggu_daerah';
        
        showTypingIndicator();
        setTimeout(() => {
            removeTypingIndicator();
            let rawQuestion = daerahQuestions[Math.floor(Math.random() * daerahQuestions.length)];
            appendMessage(formatResponseText(rawQuestion), 'ai-msg');
            inputField.placeholder = "Ketik kota/kabupaten domisili Anda...";
        }, 1500);
        return;
    }

    if (currentStep === 'menunggu_daerah') {
        userIdentity.daerah = prompt;
        
        localStorage.setItem('goona_nama', userIdentity.nama);
        localStorage.setItem('goona_daerah', userIdentity.daerah);
        currentStep = 'normal';
        
        showTypingIndicator();
        setTimeout(() => {
            removeTypingIndicator();
            let successText = modul2Variations[Math.floor(Math.random() * modul2Variations.length)];
            appendMessage(formatResponseText(successText), 'ai-msg');
            inputField.placeholder = normalPlaceholder;
        }, 1700);
        return;
    }

    showTypingIndicator();

    const emosiResponse = checkEmotionInterception(prompt);
    if (emosiResponse) {
        setTimeout(() => {
            removeTypingIndicator();
            appendMessage(emosiResponse, 'ai-msg');
        }, 1600);
        return;
    }

    let searchData = [];
    try {
        const semuaKata = prompt.toLowerCase().split(/\s+/).filter(word => word.length > 0);
        const kataKunci = semuaKata.slice(0, 3);

        // Daftar kata yang dianggap murni nama lokasi/wilayah
        const daftarKataLokasi = [
            'tanjungpinang', 'pinang', 'batam', 'bintan', 'karimun', 'lingga', 'anambas', 'natuna',
            'center', 'timur', 'barat', 'utara', 'selatan', 'kota', 'kabupaten', 'kecamatan', 'kelurahan'
        ];

        // 1. Ambil data mentah dasar reguler aktif & PPV aktif bertarget kuota aman
        let query = supabase
            .from('konten_goona')
            .select('id, judul, deskripsi, whatsapp, kategori, kabupaten_kota, harga, satuan_harga, kecamatan, url_foto, tipe_konten')
            .or('and(status.eq.aktif,tipe_konten.eq.reguler),and(status_tayang.eq.true,tipe_konten.eq.ppv,sisa_kuota_ppv.gt.0)');
            
        kataKunci.forEach(kata => {
            query = query.or(`judul.ilike.*${kata}*,deskripsi.ilike.*${kata}*,kabupaten_kota.ilike.*${kata}*,kecamatan.ilike.*${kata}*`, { foreignTable: '' });
        });
        
        const { data, error } = await query;
        if (error) {
            console.error("Error fetching data:", error);
        } else {
            searchData = data || [];
        }

        setTimeout(async () => {
            removeTypingIndicator();

            if (searchData.length > 0) {
                
                // =================================================================
                // 🚀 UPDATE JURUS LOCK WILAYAH (TARGET MARKET FILTER)
                // =================================================================
                // Deteksi apakah user menyebutkan salah satu kota/daerah spesifik di dalam ketikannya
                let userMenyebutKotaLain = semuaKata.some(kata => 
                    ['tanjungpinang', 'pinang', 'batam', 'bintan', 'karimun', 'lingga', 'anambas', 'natuna'].includes(kata)
                );

                // Dapatkan daerah domisili user saat ini secara bersih (lowercase)
                let daerahUser = (userIdentity.daerah || '').toLowerCase().trim();

                // Saring hasil pencarian agar relevan secara lokasi wilayah target market pengiklan
                let hasilSaringWilayah = searchData.filter(item => {
                    // Konten FAQ tidak terikat batasan wilayah lokal, biarkan lolos filter
                    if (item.kategori === 'FAQ') return true;

                    let kabupatenKonten = (item.kabupaten_kota || '').toLowerCase();

                    // Skenario A: Jika user secara tertulis mengetik nama kota di chatboxnya,
                    // loloskan data yang kabupaten_kota-nya COCOK dengan apa yang dia ketikkan tersebut.
                    if (userMenyebutKotaLain) {
                        return semuaKata.some(kata => kabupatenKonten.includes(kata));
                    }

                    // Skenario B: Jika user mencari umum (tanpa sebut nama kota, misal cuma ketik "Kue"),
                    // kunci dan tampilkan HANYA info yang satu wilayah dengan domisili terdaftar si user.
                    if (daerahUser) {
                        return kabupatenKonten.includes(daerahUser) || daerahUser.includes(kabupatenKonten);
                    }

                    // Failsafe jika data domisili kosong, biarkan semua lolos
                    return true;
                });
                // =================================================================

                // Pisahkan hasil pencarian yang sudah disaring wilayahnya ke kategori masing-masing
                let kontenReguler = hasilSaringWilayah.filter(item => item.tipe_konten === 'reguler' || !item.tipe_konten);
                let kontenPPV = hasilSaringWilayah.filter(item => item.tipe_konten === 'ppv');
                let kontenFAQ = hasilSaringWilayah.filter(item => item.kategori === 'FAQ');

                // Jika ada iklan PPV yang cocok, acak posisinya lalu batasi maksimal hanya 2 slot iklan saja
                if (kontenPPV.length > 0) {
                    kontenPPV.sort(() => 0.5 - Math.random());
                    kontenPPV = kontenPPV.slice(0, 2);
                }

                // Gabungkan kembali: Iklan PPV ditaruh paling atas
                let hasilAkhirTampil = [...kontenPPV, ...kontenReguler];

                // Jika hasil penyaringan wilayah menyebabkan tidak ada info tersisa, tampilkan not found
                if (hasilAkhirTampil.length === 0 && kontenFAQ.length === 0) {
                    appendMessage(dictionary.notFound, 'ai-msg');
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                    return;
                }

                const daftarPembuka = dictionary.failSafeOpen;
                const pembukaAcak = daftarPembuka[Math.floor(Math.random() * daftarPembuka.length)];
                appendMessage(pembukaAcak, 'ai-msg');

                // Tampilkan FAQ jika ada
                kontenFAQ.forEach(faq => {
                    appendMessage(faq.deskripsi, 'ai-msg');
                });

                const cardWrapper = document.createElement('div');
                cardWrapper.className = 'card-container';
                let containsCards = false;
                let idIklanYangTayang = [];

                // Cek apakah ketikan user mengandung kata spesifik (di luar daftar lokasi umum)
                let isSpesifik = semuaKata.some(kata => !daftarKataLokasi.includes(kata));

                hasilAkhirTampil.forEach(item => {
                    if (item.kategori !== 'FAQ') {
                        containsCards = true;
                        
                        // Atur label emas dan siapkan potong kuota HANYA JIKA pencarian spesifik niche
                        let pakaiEmas = false;
                        if (item.tipe_konten === 'ppv') {
                            if (isSpesifik) {
                                idIklanYangTayang.push(item.id); // Masuk daftar potong kuota via RPC
                                pakaiEmas = true;                // Mengaktifkan bingkai emas premium
                            } else {
                                pakaiEmas = false;               // Jadi kartu reguler biasa (Bonus tampil gratis)
                            }
                        }
                        
                        let cleanPhone = item.whatsapp ? item.whatsapp.replace(/[^0-9]/g, '') : '';
                        if (cleanPhone.startsWith('0')) {
                            cleanPhone = '62' + cleanPhone.substring(1);
                        }
                        
                        const encodedMsg = encodeURIComponent(`${dictionary.waTemplate} (${item.judul})`);
                        
                        let hargaTeks = "";
                        if (item.harga) {
                            const formatHarga = new Intl.NumberFormat('id-ID').format(item.harga);
                            const satuan = item.satuan_harga ? ` / ${item.satuan_harga}` : "";
                            hargaTeks = `<div class="card-desc"><b>${dictionary.priceLabel}</b> Rp ${formatHarga}${satuan}</div>`;
                        }

                        let lokasiGabungan = item.kabupaten_kota || "";
                        if (item.kecamatan) {
                            lokasiGabungan += item.kabupaten_kota ? `, ${item.kecamatan}` : item.kecamatan;
                        }
                        const lokasiTeks = lokasiGabungan ? `<div class="card-desc"><b>${dictionary.locLabel}</b> ${lokasiGabungan}</div>` : "";

                        let komponenFoto = "";
                        if (item.url_foto) {
                            komponenFoto = `<img src="${item.url_foto}" class="card-img" alt="${item.judul}" loading="lazy">`;
                        }

                        // Menentukan kelas CSS kartu berdasarkan filter pakaiEmas tadi
                        const ppvClass = pakaiEmas ? 'ppv-premium' : '';

                        cardWrapper.innerHTML += `
                            <div class="jasa-card ${ppvClass}">
                                ${komponenFoto}
                                <div class="card-title">${item.judul}</div>
                                <div class="card-desc">${item.deskripsi}</div>
                                ${lokasiTeks}
                                ${hargaTeks}
                                <a href="https://wa.me/${cleanPhone}?text=${encodedMsg}" target="_blank" class="btn-wa">
                                    💬 WhatsApp
                                </a>
                            </div>
                        `;
                    }
                });

                if (containsCards) {
                    chatHistory.appendChild(cardWrapper);
                }

                // EKSEKUSI PEMOTONGAN KUOTA: Panggil RPC database HANYA JIKA idIklanYangTayang terisi (Pencarian spesifik)
                if (idIklanYangTayang.length > 0) {
                    const { error: rpcError } = await supabase.rpc('hitung_impresi_iklan', { iklan_ids: idIklanYangTayang });
                    if (rpcError) console.error("Gagal memperbarui impresi iklan:", rpcError);
                }

                const daftarPenutup = dictionary.failSafeClose;
                const penutupAcak = daftarPenutup[Math.floor(Math.random() * daftarPenutup.length)];
                appendMessage(penutupAcak, 'ai-msg');

            } else {
                appendMessage(dictionary.notFound, 'ai-msg');
            }

            chatWindow.scrollTop = chatWindow.scrollHeight;
        }, 1500);

    } catch (err) {
        removeTypingIndicator();
        appendMessage("Maaf Kak, sistem sedang pemeliharaan. 😥", 'ai-msg');
        console.error("Fatal Error:", err);
    }
}

function appendMessage(text, className) {
    const div = document.createElement('div');
    div.className = className;
    div.innerText = text;
    chatHistory.appendChild(div);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return div;
}

menuBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    sidebar.classList.toggle('open');
});

document.addEventListener('click', (e) => {
    if (!sidebar.contains(e.target) && e.target !== menuBtn) {
        sidebar.classList.remove('open');
    }
});

window.addEventListener('DOMContentLoaded', () => {
    initWelcomeMessage();
    if (sendBtn) sendBtn.onclick = (e) => { e.preventDefault(); tanyaAI(); };
    if (inputField) inputField.onkeydown = (e) => { if (e.key === 'Enter') { e.preventDefault(); tanyaAI(); } };
});
</script>
</body>
</html>
