    <style>
        :root {
            --primary-brown: #8B4513;
            --secondary-brown: #A0522D;
            --light-brown: #D2B48C;
            --bg-brown: #FDF5E6;
            --user-bubble: #6D4C41;
            --wa-green: #25D366;
        }

        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-brown);
        }

        #app {
    display: flex;
    flex-direction: column;
    height: 100dvh; /* <--- DIUBAH MENJADI DVH */
    position: relative;
}

        header {
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            border-bottom: 1px solid var(--light-brown);
            z-index: 10;
        }

        .logo {
            font-weight: bold;
            color: var(--primary-brown);
            font-size: 18px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 20px 15px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    /* Membuat ruang obrolan kembali melebar penuh tanpa batas kaku di tengah */
    width: 100%;
}

        .ai-msg,
        .user-msg {
            max-width: 80%;
            padding: 10px 15px;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
            word-wrap: break-word;
        }

        .ai-msg {
            background: #fff;
            align-self: flex-start;
            border-radius: 0 15px 15px 15px;
            border: 1px solid var(--light-brown);
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .user-msg {
            background: var(--user-bubble);
            color: #fff;
            align-self: flex-end;
            text-align: left;
            border-radius: 15px 0 15px 15px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .input-container {
            padding: 10px 15px;
            background: #fff;
            border-top: 1px solid var(--light-brown);
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }

        .input-wrapper {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 25px;
            border: 1px solid var(--light-brown);
            outline: none;
            font-size: 14px;
            background: #FFFAF0;
        }

        button {
            background: var(--primary-brown);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }

        .btn-post {
            text-decoration: none;
            background: var(--secondary-brown);
            color: #fff;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: bold;
        }

        /* MENU HAMBURGER */
        .menu-btn {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 5px;
        }

        .menu-btn span {
            width: 20px;
            height: 3px;
            background: var(--primary-brown);
            border-radius: 2px;
            transition: 0.3s;
        }

        /* SIDEBAR DRAWER */
        .sidebar {
            position: absolute;
            top: 0;
            right: -260px;
            width: 260px;
            height: 100%;
            background: #fff;
            box-shadow: -2px 0 8px rgba(0,0,0,0.15);
            transition: right 0.3s ease;
            z-index: 99;
            padding: 60px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar.open {
            right: 0;
        }

        .sidebar h3 {
            font-size: 14px;
            color: var(--primary-brown);
            margin: 0 0 5px 0;
            border-bottom: 1px solid var(--light-brown);
            padding-bottom: 5px;
        }

        .sidebar p {
            font-size: 12px;
            color: #666;
            line-height: 1.5;
            margin: 0;
            text-align: justify;
        }

        /* TAMPILAN KARTU JASA DENGAN KOMPONEN FOTO */
        .card-container {
    display: flex;
    flex-direction: row; /* Membuat kartu menyusun ke samping di layar lebar */
    flex-wrap: wrap;     /* Jika barisan kartu sudah penuh, otomatis turun ke bawahnya */
    gap: 15px;
    width: 100%;
    margin: 5px 0;
}

        .jasa-card {
    background: #fff;
    border: 1px solid var(--light-brown);
    border-left: 5px solid var(--primary-brown);
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    /* Mengunci lebar kartu: maksimal 320px di komputer PC, dan otomatis 100% penuh jika di HP */
    width: 100%;
    max-width: 320px; 
}

        .card-title {
            font-weight: bold;
            font-size: 15px;
            color: var(--primary-brown);
            margin-bottom: 6px;
        }

        /* STYLING COCOK UNTUK GAMBAR PRODUK DI MOBILE */
        .card-img {
    width: 100%;
    /* PERBAIKAN DESKTOP: Mengunci tinggi foto agar proporsional di PC & HP */
    height: 250px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 10px;
    border: 1px solid #eee;
    display: block;
}

        .card-desc {
            font-size: 13px;
            color: #444;
            line-height: 1.4;
            margin-bottom: 12px;
            white-space: pre-line;
        }

        .btn-wa {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: var(--wa-green);
            color: #fff;
            text-decoration: none;
            padding: 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            transition: background 0.2s;
        }

        .btn-wa:hover {
            background: #20ba56;
        }

        /* LOADING ANIMATION */
        .loading-msg {
            width: 70px;
            padding: 14px 18px;
        }

        .typing {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #8B4513;
            border-radius: 50%;
            animation: bounce 1.3s infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0.7);
                opacity: 0.5;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

function showTypingIndicator() {
    const loadingDiv = document.createElement('div');
    loadingDiv.className = 'ai-msg loading-msg';
    loadingDiv.id = 'typing-indicator';
    loadingDiv.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
    chatHistory.appendChild(loadingDiv);
    chatWindow.scrollTop = chatWindow.scrollHeight;
}

function removeTypingIndicator() {
    const indicator = document.getElementById('typing-indicator');
    if (indicator) indicator.remove();
}

function formatResponseText(text) {
    return text.replace(/\[Nama\]/g, userIdentity.nama).replace(/\[Daerah\]/g, userIdentity.daerah);
}

function checkEmotionInterception(prompt) {
    const lowerPrompt = prompt.toLowerCase();

    const keywordsA = ['bingung', 'pusing', 'gak tahu', 'tidak tahu', 'gimana', 'cara', 'ribet', 'bingungin', 'pusingin'];
    if (keywordsA.some(kw => lowerPrompt.includes(kw))) {
        const responsesA = [
            "Aduh, maaf ya Kak [Nama] kalau bikin bingung atau pusing. Tenang, biar Goona bantu jelasin pelan-pelan ya. Bagian mana yang bikin Kakak bingung? 🙏",

    if (keywordsB.some(kw => lowerPrompt.includes(kw))) {
        const responsesB = [
            "Waduh, maaf banget ya Kak [Nama] atas ketidaknyamanan ini. Goona ngerti banget pasti kesel banget. Sini, biar Goona bantu cek dan selesaikan masalahnya sekarang juga. 🙏😔",

        ];
        return formatResponseText(responsesB[Math.floor(Math.random() * responsesB.length)]);
    }

    const keywordsC = ['keren', 'bagus', 'puas', 'senang', 'suka', 'mantap', 'makasih', 'terima kasih', 'top', 'terbantu'];
    if (keywordsC.some(kw => lowerPrompt.includes(kw))) {
        const responsesC = [
            "Wah, asyik! Goona ikut seneng banget kalau Kak [Nama] ngerasa terbantu dan puas. Makasih banyak ya atas apresiasinya! Ramai terus pokoknya buat warga [Daerah]! 🎉🙌",

        ];
        return formatResponseText(responsesC[Math.floor(Math.random() * responsesC.length)]);
    }

    return null;
}

                            lokasiGabungan += item.kabupaten_kota ? `, ${item.kecamatan}` : item.kecamatan;
                        }
                        const lokasiTeks = lokasiGabungan ? `<div class="card-desc"><b>${dictionary.locLabel}</b> ${lokasiGabungan}</div>` : "";

                        // PERBAIKAN KARTU FOTO: Jika url_foto ada, sisipkan tag gambar di dalam kartu
                        let komponenFoto = "";
                        if (item.url_foto) {
                            komponenFoto = `<img src="${item.url_foto}" class="card-img" alt="${item.judul}" loading="lazy">`;
                        }

                        cardWrapper.innerHTML += `
                            <div class="jasa-card">
                                ${komponenFoto}
                                <div class="card-title">${item.judul}</div>
                                <div class="card-desc">${item.deskripsi}</div>
                                ${lokasiTeks}
                                ${hargaTeks}
                                <a href="https://wa.me/${cleanPhone}?text=${encodedMsg}" target="_blank" class="btn-wa">
                                    💬 WhatsApp
                                </a>
                            </div>
                        `;
                    }
                });

                if (containsCards) {
                    chatHistory.appendChild(cardWrapper);
                }

                const daftarPenutup = dictionary.failSafeClose;
                const penutupAcak = daftarPenutup[Math.floor(Math.random() * daftarPenutup.length)];
                appendMessage(penutupAcak, 'ai-msg');

            } else {
                appendMessage(dictionary.notFound, 'ai-msg');
            }

            chatWindow.scrollTop = chatWindow.scrollHeight;
        }, 1500);

    } catch (err) {
        removeTypingIndicator();
        appendMessage("Maaf Kak, sistem sedang pemeliharaan. 😥", 'ai-msg');
        console.error("Fatal Error:", err);
    }
}

function appendMessage(text, className) {
    const div = document.createElement('div');
    div.className = className;
    div.innerText = text;
    chatHistory.appendChild(div);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return div;
}

menuBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    sidebar.classList.toggle('open');
});

document.addEventListener('click', (e) => {
    if (!sidebar.contains(e.target) && e.target !== menuBtn) {
        sidebar.classList.remove('open');
    }
});

window.addEventListener('DOMContentLoaded', () => {
    initWelcomeMessage();
    if (sendBtn) sendBtn.onclick = (e) => { e.preventDefault(); tanyaAI(); };
    if (inputField) inputField.onkeydown = (e) => { if (e.key === 'Enter') { e.preventDefault(); tanyaAI(); } };
});
</script>
