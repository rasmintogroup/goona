<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Goona AI</title>

    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="Pavicon_goona.png">

    <style>
        :root {
            --primary-brown: #8B4513;
            --secondary-brown: #A0522D;
            --light-brown: #D2B48C;
            --bg-brown: #FDF5E6;
            --user-bubble: #6D4C41;
        }

        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-brown);
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            border-bottom: 1px solid var(--light-brown);
            z-index: 10;
        }

        .logo {
            font-weight: bold;
            color: var(--primary-brown);
            font-size: 18px;
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .ai-msg,
        .user-msg {
            max-width: 80%;
            padding: 10px 15px;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
            word-wrap: break-word;
        }

        .ai-msg {
            background: #fff;
            align-self: flex-start;
            border-radius: 0 15px 15px 15px;
            border: 1px solid var(--light-brown);
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .user-msg {
            background: var(--user-bubble);
            color: #fff;
            align-self: flex-end;
            text-align: left;
            border-radius: 15px 0 15px 15px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .input-container {
            padding: 10px 15px;
            background: #fff;
            border-top: 1px solid var(--light-brown);
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }

        .input-wrapper {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 25px;
            border: 1px solid var(--light-brown);
            outline: none;
            font-size: 14px;
            background: #FFFAF0;
        }

        button {
            background: var(--primary-brown);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }

        .btn-post {
            text-decoration: none;
            background: var(--secondary-brown);
            color: #fff;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: bold;
        }

        /* LOADING ANIMATION */

        .loading-msg {
            width: 70px;
            padding: 14px 18px;
        }

        .typing {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #8B4513;
            border-radius: 50%;
            animation: bounce 1.3s infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0.7);
                opacity: 0.5;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

<div id="app">

    <header>
        <div class="logo">GOONA AI</div>
        <a href="tambah-info.html" class="btn-post">+ Pasang Info</a>
    </header>

    <main id="chat-window">

        <div id="chat-history"
             style="display:flex; flex-direction:column; gap:15px;">

            <div class="ai-msg">
                Halo Cik/Bang! Saya AI Goona 😊
                Mau cari loker, jasa, atau info apa di Kepri hari ini?
            </div>

        </div>

    </main>

    <div class="input-container">

        <div class="input-wrapper">

            <input
                type="text"
                id="user-input"
                placeholder="Tanya di sini..."
            >

            <button id="send-btn">
                Tanya
            </button>

        </div>

    </div>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

const SUPABASE_URL = 'https://ejnuelaqlgfcmcqpxmpa.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqbnVlbGFxbGdmY21jcXB4bXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MzIzMjcsImV4cCI6MjA5MzMwODMyN30.32tG2nN1a3cDa6M__qe7PNWG5ZzeF7zs1eDZSxXviNM';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const inputField = document.getElementById('user-input');
const chatHistory = document.getElementById('chat-history');
const chatWindow = document.getElementById('chat-window');
const sendBtn = document.getElementById('send-btn');

async function tanyaAI() {
    const prompt = inputField.value.trim();
    if (!prompt) return;

    appendMessage(prompt, 'user-msg');
    inputField.value = '';

    const loadingDiv = document.createElement('div');
    loadingDiv.className = 'ai-msg loading-msg';
    loadingDiv.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
    chatHistory.appendChild(loadingDiv);
    chatWindow.scrollTop = chatWindow.scrollHeight;

    try {
        const { data } = await supabase.from('konten_goona').select('judul, deskripsi').eq('status', 'aktif').limit(5);
        const contextData = (data && data.length > 0) ? data.map(item => `${item.judul}: ${item.deskripsi}`).join('\n') : "";

        const response = await fetch("/tanya", { 
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: "google/gemma-4-31b:free",
                messages: [
                    { role: "system", content: "Kamu adalah AI Goona. Jawab dengan data referensi jika tersedia." },
                    { role: "user", content: `Konteks:\n${contextData}\n\nPertanyaan: ${prompt}` }
                ],
                stream: true // Kita matikan stream untuk stabilitas tes
            })
        });

        if (!response.ok) throw new Error('Koneksi AI Terputus');

        // Cara baca JSON utuh (Non-Streaming)
        const result = await response.json();
        
        loadingDiv.remove();

        if (result.choices && result.choices[0]) {
            const aiText = result.choices[0].message.content;
            appendMessage(aiText, 'ai-msg');
        } else {
            throw new Error('Respons AI kosong');
        }

    } catch (err) {
        if (loadingDiv) loadingDiv.remove();
        appendMessage("Maaf Cik, koneksi terganggu. Sila coba sekejap lagi.", 'ai-msg');
        console.error(err);
    }
}
function appendMessage(text, className) {
    const div = document.createElement('div');
    div.className = className;
    div.innerText = text;
    chatHistory.appendChild(div);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return div;
}

// PENGAMAN TOMBOL: Pastikan terpasang dengan kuat
window.addEventListener('DOMContentLoaded', () => {
    if (sendBtn) {
        sendBtn.onclick = (e) => {
            e.preventDefault();
            tanyaAI();
        };
    }
    if (inputField) {
        inputField.onkeydown = (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                tanyaAI();
            }
        };
    }
});
</script>
