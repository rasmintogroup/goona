<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pasang Info - Goona AI</title>
    <link rel="icon" type="image/png" href="Pavicon_goona.png">

    <style>
        :root {
            --primary-brown: #8B4513;
            --secondary-brown: #A0522D;
            --light-brown: #D2B48C;
            --bg-brown: #FDF5E6;
            --white: #ffffff;
            --success-green: #2ecc71;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-brown); 
            margin: 0; 
            padding: 10px; 
            color: #3E2723; 
            line-height: 1.5;
        }

        .container { 
            max-width: 600px; 
            margin: 10px auto; 
            background: var(--white); 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(139, 69, 19, 0.1); 
            border: 1px solid var(--light-brown); 
        }

        h2 { 
            color: var(--primary-brown); 
            margin: 0 0 5px 0;
            font-size: 22px; 
            text-align: center;
        }

        .sub-title {
            text-align: center;
            font-size: 13px;
            color: #795548;
            margin-bottom: 20px;
        }

        form { display: flex; flex-direction: column; gap: 15px; }

        .form-group { display: flex; flex-direction: column; gap: 5px; }

        label { 
            font-weight: bold; 
            font-size: 14px; 
            color: var(--primary-brown); 
            margin-left: 5px;
        }
        
        textarea, input, select { 
            width: 100%; 
            padding: 12px 15px; 
            border-radius: 12px; 
            border: 1.5px solid var(--light-brown); 
            outline: none; 
            font-size: 16px; /* Ukuran 16px mencegah auto-zoom di iPhone */
            background-color: #FFFAF0;
            transition: all 0.3s ease;
            color: #3E2723;
        }

        textarea { height: 120px; resize: none; }
        
        input:focus, select:focus, textarea:focus {
            border-color: var(--primary-brown);
            background-color: var(--white);
            box-shadow: 0 0 0 3px rgba(139, 69, 19, 0.1);
        }

        .row { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
        }

        #char-count { 
            text-align: right; 
            font-size: 11px; 
            color: #8D6E63; 
            margin-top: -10px;
        }

        button { 
            background: linear-gradient(135deg, var(--primary-brown), var(--secondary-brown));
            color: #fff; 
            border: none; 
            padding: 16px; 
            width: 100%; 
            border-radius: 15px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold; 
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(139, 69, 19, 0.2);
            transition: transform 0.2s;
        }

        button:active { transform: scale(0.98); }
        button:disabled { background: #D7CCC8; cursor: not-allowed; box-shadow: none; }

        .back-link { 
            display: block; 
            margin-top: 20px; 
            text-align: center; 
            color: var(--secondary-brown); 
            text-decoration: none; 
            font-size: 14px; 
            font-weight: 500;
        }

        /* STYLING NOTIFIKASI SUKSES MENGAMBANG (TOAST COCOK UNTUK MOBILE) */
        .toast-notification {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: #ffffff;
            padding: 12px 20px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            border: 1px solid #e2e8f0;
            z-index: 9999;
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
            opacity: 0;
            width: 90%;
            max-width: 450px;
        }

        .toast-notification.show {
            top: 25px;
            opacity: 1;
        }

        .toast-icon {
            width: 28px;
            height: 28px;
            background: var(--success-green);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            flex-shrink: 0;
        }

        .toast-text {
            font-size: 14px;
            font-weight: 600;
            color: #2d3748;
        }

        @media (max-width: 480px) {
            .row { grid-template-columns: 1fr; }
            .container { padding: 15px; border-radius: 15px; }
            h2 { font-size: 18px; }
        }
    </style>
</head>
<body>

    <div id="toast" class="toast-notification">
        <div class="toast-icon">✓</div>
        <div class="toast-text" id="toast-message">Informasi berhasil dikirim!</div>
    </div>

    <div class="container">
        <h2>Pasang Informasi</h2>
        <p class="sub-title">Info Anda akan tampil di jaringan Goona AI</p>
        
        <form id="upload-form">
            <div class="form-group">
                <label>Kategori</label>
                <select id="kategori" required>
                    <option value="">-- Pilih Kategori --</option>
                    <option value="Jasa">Jasa</option>
                    <option value="Loker">Loker</option>
                    <option value="Jual Beli">Jual Beli</option>
                    <option value="Kuliner">Kuliner</option>
                    <option value="Properti">Properti (Sewa/Kos)</option>
                    <option value="Wisata">Wisata</option>
                    <option value="Info/Pengumuman">Info/Pengumuman</option>
                </select>
            </div>

            <div class="form-group">
                <label>Judul Informasi (Maks 50 Karakter)</label>
                <input type="text" id="judul-info" placeholder="Contoh: Jual Motor Bekas Mulus" required maxlength="50">
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Kabupaten/Kota</label>
                    <select id="kabupaten" required></select>
                </div>
                <div class="form-group">
                    <label>Kecamatan</label>
                    <select id="kecamatan" required disabled>
                        <option value="">-- Pilih --</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Harga (Rp) - <small>Opsional</small></label>
                    <input type="number" id="harga" placeholder="Contoh: 150000">
                </div>
                <div class="form-group">
                    <label>Satuan Harga</label>
                    <select id="satuan_harga">
                        <option value="">-- Tanpa Satuan --</option>
                        <option value="Porsi">/ Porsi</option>
                        <option value="Bulan">/ Bulan</option>
                        <option value="Hari">/ Hari</option>
                        <option value="Jam">/ Jam</option>
                        <option value="Unit">/ Unit</option>
                        <option value="Borongan">/ Borongan</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Deskripsi Singkat (Maks 200 Karakter)</label>
                <textarea id="deskripsi" maxlength="200" placeholder="Jelaskan detail ringkas di sini..." required></textarea>
                <div id="char-count">Sisa: <span id="count">200</span> karakter</div>
            </div>
            
            <div class="form-group">
                <label>Nomor WhatsApp</label>
                <input type="tel" id="wa-number" placeholder="Contoh: 081234567890" required autocomplete="off">
            </div>

            <div class="form-group">
                <label>URL Tautan Foto Jasa/Produk <small>(Opsional)</small></label>
                <input type="url" id="url-foto" placeholder="Contoh: https://linkfoto.com/gambar.jpg">
            </div>

            <button type="submit" id="submit-btn">Kirim Informasi Sekarang</button>
        </form>
        
        <a href="index.html" class="back-link">← Kembali ke Chat</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script type="module">
        const SUPABASE_URL = 'https://ejnuelaqlgfcmcqpxmpa.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqbnVlbGFxbGdmY21jcXB4bXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MzIzMjcsImV4cCI6MjA5MzMwODMyN30.32tG2nN1a3cDa6M__qe7PNWG5ZzeF7zs1eDZSxXviNM';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const dataWilayah = {
            "Kota Batam": ["Batam Kota", "Batu Ampar", "Batu Aji", "Belakang Padang", "Bengkong", "Bulang", "Galang", "Lubuk Baja", "Nongsa", "Sagulung", "Sei Beduk", "Sekupang"],
            "Kota Tanjungpinang": ["Tanjungpinang Barat", "Tanjungpinang Kota", "Tanjungpinang Timur", "Bukit Bestari"],
            "Kabupaten Bintan": ["Bintan Pesisir", "Bintan Timur", "Bintan Utara", "Gunung Kijang", "Mantang", "Seri Kuala Lobam", "Tambelan", "Teluk Bintan", "Teluk Sebong", "Toapaya"],
            "Kabupaten Karimun": ["Belat", "Buru", "Durai", "Karimun", "Kundur", "Kundur Barat", "Kundur Utara", "Meral", "Meral Barat", "Moro", "Selat Gelam", "Tebing", "Ungar"],
            "Kabupaten Lingga": ["Bakung Serumpun", "Katang Bidare", "Kepulauan Posek", "Lingga", "Lingga Timur", "Lingga Utara", "Pesisir Bukit", "Selayar", "Senayang", "Singkep", "Singkep Barat", "Singkep Pesisir", "Singkep Selatan", "Temiang Pesisir"],
            "Kabupaten Natuna": ["Bunguran Barat", "Bunguran Batubi", "Bunguran Selatan", "Bunguran Tengah", "Bunguran Timur", "Bunguran Timur Laut", "Bunguran Utara", "Midai", "Pulau Laut", "Pulau Panjang", "Pulau Tiga", "Pulau Tiga Barat", "Serasan", "Serasan Timur", "Suak Midai", "Subi"],
            "Kabupaten Kepulauan Anambas": ["Jemaja", "Jemaja Barat", "Jemaja Timur", "Kute Siantan", "Palmatak", "Siantan", "Siantan Selatan", "Siantan Tengah", "Siantan Timur", "Siantan Utara"]
        };

        const kabSelect = document.getElementById('kabupaten');
        const kecSelect = document.getElementById('kecamatan');
        const deskripsiInput = document.getElementById('deskripsi');
        const countSpan = document.getElementById('count');
        const form = document.getElementById('upload-form');
        const submitBtn = document.getElementById('submit-btn');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toast-message');

        // FUNGSI PEMICU NOTIFIKASI MENGAMBANG PINTAR
        function tunjukkanToast(pesan, warnaIcon = '#2ecc71') {
            toastMessage.innerText = pesan;
            document.querySelector('.toast-icon').style.background = warnaIcon;
            toast.classList.add('show');
            
            // Sembunyikan otomatis setelah 3.5 detik
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3500);
        }

        // Init Kabupaten
        function initKabupaten() {
            kabSelect.innerHTML = '<option value="">-- Pilih Kota --</option>';
            Object.keys(dataWilayah).sort().forEach(kab => {
                const opt = document.createElement('option');
                opt.value = kab;
                opt.text = kab;
                kabSelect.add(opt);
            });
        }

        // Cascading Logic
        kabSelect.addEventListener('change', () => {
            const val = kabSelect.value;
            kecSelect.innerHTML = '<option value="">-- Pilih Kecamatan --</option>';
            if (val) {
                kecSelect.disabled = false;
                dataWilayah[val].sort().forEach(kec => {
                    const opt = document.createElement('option');
                    opt.value = kec;
                    opt.text = kec;
                    kecSelect.add(opt);
                });
            } else {
                kecSelect.disabled = true;
            }
        });

        // Counter
        deskripsiInput.addEventListener('input', () => {
            countSpan.innerText = 200 - deskripsiInput.value.length;
        });

        // Submit Action
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.innerText = "Mengirim...";
            submitBtn.disabled = true;

            const payload = {
                kategori: document.getElementById('kategori').value,
                judul: document.getElementById('judul-info').value, 
                kabupaten_kota: kabSelect.value,
                kecamatan: kecSelect.value,
                harga: document.getElementById('harga').value ? parseInt(document.getElementById('harga').value) : null,
                satuan_harga: document.getElementById('satuan_harga').value || null,
                deskripsi: deskripsiInput.value,
                whatsapp: document.getElementById('wa-number').value,
                url_foto: document.getElementById('url-foto').value || null,
                status: 'pending',
                created_at: new Date().toISOString()
            };

            try {
                const { error } = await supabase.from('konten_goona').insert([payload]);
                if (error) throw error;
                
                // EKSEKUSI TOAST SUKSES MENGAMBANG
                tunjukkanToast("Sukses! Informasi Goonity diajukan untuk ditinjau.");
                
                form.reset();
                kecSelect.disabled = true;
                countSpan.innerText = "200";
            } catch (err) {
                console.error("Kesalahan pengiriman:", err);
                tunjukkanToast("Gagal mengirim. Periksa jaringan Anda.", "#e74c3c");
            } finally {
                submitBtn.innerText = "Kirim Informasi Sekarang";
                submitBtn.disabled = false;
            }
        });

        initKabupaten();
    </script>
</body>
</html>
