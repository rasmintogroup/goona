<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saran - Goona</title>
    <link rel="icon" type="image/png" sizes="48x48" href="Pavicon_goona.png">
    <!-- Tambahkan SDK Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --goona-brown: #5D4037;
            --goona-light: #f8f9fa;
            --error-red: #d93025;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #3c4043;
            position: relative;
        }

        /* --- NAVIGATION ELEMENTS --- */
        .top-nav-left {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        /* Logo Tulisan Goona */
        .text-logo {
            font-size: 30px;
            font-weight: 700;
            color: var(--goona-brown);
            letter-spacing: -0.5px;
            cursor: pointer;
        }

        .top-nav-right {
            position: absolute;
            top: 20px;
            right: 25px;
            text-decoration: none;
            color: #70757a;
            font-size: 24px;
            transition: color 0.2s;
            cursor: pointer;
        }

        .top-nav-right:hover {
            color: var(--error-red);
        }

        .saran-container {
            width: 100%;
            max-width: 500px;
            padding: 30px;
            margin: 20px;
        }

        h2 {
            color: var(--goona-brown);
            font-size: 24px;
            margin-bottom: 10px;
            text-align: center;
        }

        .intro-text {
            font-size: 15px;
            line-height: 1.6;
            text-align: center;
            margin-bottom: 30px;
            color: #5f6368;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 15px;
        }

        .required {
            color: var(--error-red);
            margin-left: 4px;
        }

        input, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1.5px solid #dfe1e5;
            border-radius: 12px;
            font-family: 'Quicksand', sans-serif;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus {
            border-color: var(--goona-brown);
        }

        textarea {
            resize: none;
            height: 150px;
        }

        .char-count {
            font-size: 12px;
            color: #70757a;
            text-align: right;
            margin-top: 5px;
        }

        .btn-kirim {
            width: 100%;
            background-color: var(--goona-brown);
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 10px;
        }

        .btn-kirim:hover {
            opacity: 0.9;
        }

        /* --- NOTIFIKASI MENGAMBANG (POPUP) --- */
        #notification-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .notif-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .notif-box i {
            font-size: 60px;
            color: #25D366;
            margin-bottom: 20px;
        }

        .notif-box h3 {
            margin: 0 0 10px 0;
            color: var(--goona-brown);
        }

        .notif-box p {
            font-size: 14px;
            color: #5f6368;
            margin-bottom: 25px;
        }

        .btn-home {
            color: var(--goona-brown);
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            border: 1px solid var(--goona-brown);
            padding: 10px 20px;
            border-radius: 20px;
            display: inline-block;
        }

        .btn-home:hover {
            background: var(--goona-brown);
            color: white;
        }
    </style>
</head>
<body>

    <!-- Logo Tulisan di Pojok Kiri Atas -->
    <a href="index.html" class="top-nav-left">
        <span class="text-logo">Goona</span>
    </a>

    <!-- Ikon Silang di Pojok Kanan Atas -->
    <div class="top-nav-right" onclick="window.history.back()">
        <i class="fa-solid fa-xmark"></i>
    </div>

    <div class="saran-container">
        <h2>Kirim Saran</h2>
        <p class="intro-text">
            Punya ide atau keluhan agar Goona makin paten? <br>
            Sila bagi saran Awak di bawah ni, Wak!
        </p>

        <form id="saranForm" onsubmit="kirimSaran(event)">
            <div class="form-group">
                <label>Nama Lengkap<span class="required">*</span></label>
                <input type="text" id="nama" placeholder="Masukkan nama Awak..." required>
            </div>

            <div class="form-group">
                <label>Nomor HP / WhatsApp<span class="required">*</span></label>
                <input type="tel" id="hp" placeholder="Contoh: 0812..." required>
            </div>

            <div class="form-group">
                <label>Saran Awak<span class="required">*</span></label>
                <textarea id="saran" maxlength="500" placeholder="Apa yang perlu kami perbaiki atau tambahkan di Kepri ini?" oninput="updateCount()" required></textarea>
                <div class="char-count"><span id="current">0</span>/500 Karakter</div>
            </div>

            <button type="submit" class="btn-kirim">Kirim Saran</button>
        </form>
    </div>

    <!-- Popup Notifikasi -->
    <div id="notification-overlay">
        <div class="notif-box">
            <i class="fa-solid fa-circle-check"></i>
            <h3>Saran Diterima!</h3>
            <p>Terima kasih banyak atas kepedulian Awak untuk memajukan Goona di Kepri.</p>
            <a href="index.html" class="btn-home">Kembali ke Beranda</a>
        </div>
    </div>

    <script>
        // --- 1. INISIALISASI DATABASE ---
        const SUPABASE_URL = "https://ejnuelaqlgfcmcqpxmpa.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqbnVlbGFxbGdmY21jcXB4bXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MzIzMjcsImV4cCI6MjA5MzMwODMyN30.32tG2nN1a3cDa6M__qe7PNWG5ZzeF7zs1eDZSxXviNM";
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- 2. FUNGSI PENDUKUNG ---
        function updateCount() {
            const saranInput = document.getElementById('saran');
            if (saranInput) {
                const length = saranInput.value.length;
                document.getElementById('current').innerText = length;
            }
        }

        // --- 3. FUNGSI UTAMA PENGIRIMAN ---
        async function kirimSaran(e) {
            if (e) e.preventDefault();
            
            const btn = document.querySelector('.btn-kirim');
            const originalText = btn.innerText;
            
            const dataSaran = {
                nama: document.getElementById('nama').value,
                whatsapp: document.getElementById('hp').value, 
                saran: document.getElementById('saran').value
            };

            btn.innerText = "Mengirim...";
            btn.disabled = true;

            try {
                const { data, error } = await _supabase
                    .from('saran_pengguna')
                    .insert([dataSaran]);

                if (error) throw error;

                document.getElementById('notification-overlay').style.display = 'flex';
                document.getElementById('saranForm').reset();
                updateCount();

            } catch (error) {
                console.error("Error Detail:", error);
                alert("Waduh, ada kendala saat mengirim, Wak! Pesan: " + error.message);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
