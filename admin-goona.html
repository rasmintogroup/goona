<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Goona Admin - Final Stable</title>
    <link rel="icon" type="image/png" href="Pavicon_goona.png">
    <style>
        :root { 
            --primary: #8B4513; 
            --secondary-brown: #A0522D;
            --light-brown: #D2B48C;
            --bg: #FDF5E6; 
            --white: #ffffff;
            --danger-red: #d9534f;
            --success-green: #28a745;
            --accent-blue: #3498db;
        }
        
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 15px; 
            color: #3E2723;
        }

        .container { 
            max-width: 1000px; 
            margin: auto; 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(139, 69, 19, 0.1); 
            border: 1px solid var(--light-brown);
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 3px solid var(--primary); 
            padding-bottom: 15px; 
            margin-bottom: 25px; 
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h2 { color: var(--primary); margin: 0; font-size: 24px; }
        
        /* METRIKS DASBOR ATAS YANG MENARIK */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .metric-card {
            background: var(--white);
            border-radius: 16px;
            padding: 18px;
            box-shadow: 0 4px 12px rgba(139, 69, 19, 0.05);
            border: 1px solid var(--light-brown);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .metric-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            flex-shrink: 0;
        }

        .metric-info { display: flex; flex-direction: column; }
        .metric-value { font-size: 24px; font-weight: bold; color: #3E2723; line-height: 1.2; }
        .metric-label { font-size: 12px; color: #8D6E63; font-weight: 500; }

        /* KONTROL FILTER JALUR ATAS */
        .table-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        select {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1.5px solid var(--light-brown);
            background-color: #FFFAF0;
            font-size: 14px;
            color: #3E2723;
            outline: none;
        }

        /* STRUKTUR TABEL */
        .table-wrapper { width: 100%; overflow-x: auto; border-radius: 12px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background-color: var(--primary); color: white; padding: 15px; font-weight: bold; }
        td { padding: 15px; border-bottom: 1px solid #eee; vertical-align: middle; }

        .text-center { text-align: center; }
        .text-left { text-align: left; }

        /* STYLING BUTTON */
        .btn { padding: 8px 16px; border: none; border-radius: 6px; color: white; cursor: pointer; font-weight: bold; font-size: 13px; transition: transform 0.1s; }
        .btn:active { transform: scale(0.96); }
        .btn-hapus { background: var(--danger-red); }
        .btn-ok { background: var(--success-green); }
        
        .wa-link { color: #25D366; font-weight: bold; text-decoration: none; border-bottom: 1px dashed #25D366; }
        .wa-link:hover { color: #128C7E; }

        /* PANEL INTERFACE LOGIN */
        #login-panel { text-align: center; padding: 60px 20px; }
        #admin-panel { display: none; }
        input[type="password"] { padding: 12px; width: 260px; border-radius: 8px; border: 1.5px solid var(--light-brown); margin-bottom: 15px; outline: none; background: #FFFAF0; font-size: 16px; text-align: center; }
        input[type="password"]:focus { border-color: var(--primary); background: #fff; }

        /* LAYOUT RESPONSIVE MOBILE FRIENDLY (TABEL MAJU JADI KARTU) */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { padding: 15px; border-radius: 15px; }
            .header h2 { font-size: 20px; }
            
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; }
            
            tr {
                border: 1px solid var(--light-brown);
                padding: 12px;
                background: #FFFAF0;
                margin-bottom: 12px;
                border-radius: 12px;
                box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            }

            td {
                border-bottom: 1px dashed #e2e8f0;
                padding: 8px 0;
                display: flex;
                flex-direction: column;
                text-align: left !important;
            }

            td::before {
                content: attr(data-label);
                font-weight: bold;
                color: var(--primary);
                font-size: 11px;
                text-transform: uppercase;
                margin-bottom: 2px;
            }

            td:last-child {
                border-bottom: none;
                padding-top: 12px;
                flex-direction: row;
                justify-content: flex-end;
            }
            
            select { flex: 1; }
            .table-controls { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="login-panel">
        <h2 style="color:var(--primary); margin-bottom: 20px;">Admin Goona AI</h2>
        <input type="password" id="input-password" placeholder="Masukkan Password">
        <br>
        <button id="btn-login-action" class="btn" style="background:var(--primary); padding: 12px 60px; border-radius: 8px;">MASUK</button>
    </div>

    <div id="admin-panel">
        <div class="header">
            <h2>Dashboard Utama Admin</h2>
            <button id="btn-refresh" class="btn" style="background:#444; border-radius: 8px;">🔄 Refresh Data</button>
        </div>

        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-icon" style="background: var(--accent-blue);">📋</div>
                <div class="metric-info">
                    <span class="metric-value" id="stat-total">0</span>
                    <span class="metric-label">Total Pendaftar</span>
                </div>
            </div>
            <div class="metric-card">
                <div class="metric-icon" style="background: var(--success-green);">✨</div>
                <div class="metric-info">
                    <span class="metric-value" id="stat-today">0</span>
                    <span class="metric-label">Baru Hari Ini</span>
                </div>
            </div>
            <div class="metric-card">
                <div class="metric-icon" style="background: #e67e22;">👥</div>
                <div class="metric-info">
                    <span class="metric-value" id="stat-visitors">1.240</span>
                    <span class="metric-label">Jumlah Pengunjung</span>
                </div>
            </div>
        </div>

        <div class="table-controls">
            <select id="filter-kategori">
                <option value="ALL">Semua Kategori</option>
                <option value="Jasa">Jasa</option>
                <option value="Loker">Loker</option>
                <option value="Kuliner">Kuliner</option>
                <option value="Jual Beli">Jual Beli</option>
            </select>
            <select id="filter-status">
                <option value="ALL">Semua Status</option>
                <option value="pending">Pending</option>
                <option value="aktif">Aktif</option>
            </select>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th class="text-left">Layanan</th>
                        <th class="text-center">WhatsApp</th>
                        <th class="text-center">Status</th>
                        <th class="text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="isi-tabel"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    let supabaseClient;
    let cacheDatabaseData = [];
    const SB_URL = 'https://ejnuelaqlgfcmcqpxmpa.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqbnVlbGFxbGdmY21jcXB4bXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MzIzMjcsImV4cCI6MjA5MzMwODMyN30.32tG2nN1a3cDa6M__qe7PNWG5ZzeF7zs1eDZSxXviNM';

    window.onload = () => {
        supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);
        document.getElementById('btn-login-action').onclick = prosesMasuk;
        document.getElementById('input-password').onkeydown = (e) => { if(e.key === 'Enter') prosesMasuk(); };
        document.getElementById('btn-refresh').onclick = panggilDatabase;
        
        // Hubungkan fungsi filter menu ganti opsi
        document.getElementById('filter-kategori').onchange = saringDanCetakTabel;
        document.getElementById('filter-status').onchange = saringDanCetakTabel;
    };

    function prosesMasuk() {
        const pass = document.getElementById('input-password').value;
        if(pass === 'goona2026') {
            document.getElementById('login-panel').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            panggilDatabase();
        } else { alert('Password Salah!'); }
    }

    async function panggilDatabase() {
        const listBody = document.getElementById('isi-tabel');
        listBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Memuat data...</td></tr>';

        const { data, error } = await supabaseClient
            .from('konten_goona')
            .select('*')
            .order('created_at', { ascending: false });

        if(error) { alert('Gagal: ' + error.message); return; }

        cacheDatabaseData = data || [];
        hitungMetriks(cacheDatabaseData);
        saringDanCetakTabel();
    }

    // HITUNG DATA KARTU ATAS SECARA AKURAT
    function hitungMetriks(dataList) {
        document.getElementById('stat-total').innerText = dataList.length;

        // Hitung data pendaftar baru masuk hari ini
        const hariIni = new Date().toISOString().split('T')[0];
        const pendaftarHariIni = dataList.filter(item => item.created_at && item.created_at.startsWith(hariIni)).length;
        document.getElementById('stat-today').innerText = pendaftarHariIni;

        // Simulasi Visitor Counter Berbasis LocalStorage
        let vCount = localStorage.getItem('goonity_visitors') || 1240;
        vCount = parseInt(vCount) + Math.floor(Math.random() * 2);
        localStorage.setItem('goonity_visitors', vCount);
        document.getElementById('stat-visitors').innerText = new Intl.NumberFormat('id-ID').format(vCount);
    }

    // SARING DATA & CETAK (MENDUKUNG MOBILE CARD)
    function saringDanCetakTabel() {
        const listBody = document.getElementById('isi-tabel');
        listBody.innerHTML = '';

        const filterKat = document.getElementById('filter-kategori').value;
        const filterStat = document.getElementById('filter-status').value;

        const filtered = cacheDatabaseData.filter(item => {
            const cocokKat = (filterKat === 'ALL' || item.kategori === filterKat);
            const cocokStat = (filterStat === 'ALL' || item.status === filterStat);
            return cocokKat && cocokStat;
        });

        if (filtered.length === 0) {
            listBody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#8d6e63; padding:20px;">Belum ada pendaftaran yang sesuai.</td></tr>';
            return;
        }

        filtered.forEach(item => {
            const tr = document.createElement('tr');
            const waNum = item.whatsapp || '-';
            const waKlik = waNum.replace(/\D/g, '');
            const waFinal = waKlik.startsWith('0') ? '62' + waKlik.slice(1) : waKlik;

            tr.innerHTML = `
                <td data-label="Layanan" class="text-left">
                    <b>${item.judul || '-'}</b>
                    <div style="font-size:12px; color:#795548; margin-top:2px;">${item.kategori || '-'} | ${item.kabupaten_kota || '-'}</div>
                </td>
                <td data-label="WhatsApp" class="text-center">
                    <a href="https://wa.me/${waFinal}" target="_blank" class="wa-link">${waNum}</a>
                </td>
                <td data-label="Status" class="text-center" style="color:${item.status === 'aktif' ? 'green' : 'orange'}; font-weight:bold">
                    ${item.status.toUpperCase()}
                </td>
                <td data-label="Aksi" class="text-center">
                    <div style="display:flex; gap:5px; justify-content:center;">
                        ${item.status === 'pending' ? `<button onclick="aksiAktifkan('${item.id}')" class="btn btn-ok">OK</button>` : ''}
                        <button onclick="aksiHapus('${item.id}')" class="btn btn-hapus">Delete</button>
                    </div>
                </td>
            `;
            listBody.appendChild(tr);
        });
    }

    window.aksiAktifkan = async (id) => {
        await supabaseClient.from('konten_goona').update({ status: 'aktif' }).eq('id', id);
        panggilDatabase();
    };

    window.aksiHapus = async (id) => {
        if(confirm('Apakah kawan yakin ingin menghapus data ini?')) {
            await supabaseClient.from('konten_goona').delete().eq('id', id);
            panggilDatabase();
        }
    };
</script>
</body>
</html>
