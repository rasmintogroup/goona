<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goona Admin - Final Stable</title>
    <style>
        :root { --primary: #8B4513; --bg: #FDF5E6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary); padding-bottom: 15px; margin-bottom: 25px; }
        .header h2 { color: var(--primary); margin: 0; }
        .table-wrapper { width: 100%; overflow-x: auto; }
        
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background-color: var(--primary); color: white; padding: 15px; }
        td { padding: 15px; border-bottom: 1px solid #eee; }

        /* PERBAIKAN POSISI TEKS (Tengah Kolom) */
        .text-center { text-align: center; }
        .text-left { text-align: left; }

        .btn { padding: 8px 16px; border: none; border-radius: 6px; color: white; cursor: pointer; font-weight: bold; font-size: 13px; }
        .btn-edit { background: #f0ad4e; }
        .btn-hapus { background: #d9534f; }
        .btn-ok { background: #28a745; }
        
        /* Gaya Link WhatsApp */
        .wa-link { color: #25D366; font-weight: bold; text-decoration: none; border-bottom: 1px dashed #25D366; }
        .wa-link:hover { color: #128C7E; }

        #login-panel { text-align: center; padding: 70px 20px; }
        #admin-panel { display: none; }
        input[type="password"] { padding: 12px; width: 250px; border-radius: 6px; border: 1px solid #ccc; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-panel">
        <h2 style="color:var(--primary)">Admin Goona AI</h2>
        <input type="password" id="input-password" placeholder="Password">
        <br>
        <button id="btn-login-action" class="btn" style="background:var(--primary); padding: 12px 50px;">MASUK</button>
    </div>

    <div id="admin-panel">
        <div class="header">
            <h2>Manajemen Data</h2>
            <button id="btn-refresh" class="btn" style="background:#444">🔄 Refresh</button>
        </div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th class="text-left">Layanan</th>
                        <th class="text-center">WhatsApp</th>
                        <th class="text-center">Status</th>
                        <th class="text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="isi-tabel"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    let supabaseClient;
    const SB_URL = 'https://ejnuelaqlgfcmcqpxmpa.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqbnVlbGFxbGdmY21jcXB4bXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MzIzMjcsImV4cCI6MjA5MzMwODMyN30.32tG2nN1a3cDa6M__qe7PNWG5ZzeF7zs1eDZSxXviNM';

    window.onload = () => {
        supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);
        document.getElementById('btn-login-action').onclick = prosesMasuk;
        document.getElementById('input-password').onkeypress = (e) => { if(e.key === 'Enter') prosesMasuk(); };
        document.getElementById('btn-refresh').onclick = panggilDatabase;
    };

    function prosesMasuk() {
        const pass = document.getElementById('input-password').value;
        if(pass === 'goona2026') {
            document.getElementById('login-panel').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            panggilDatabase();
        } else { alert('Password Salah!'); }
    }

    async function panggilDatabase() {
        const listBody = document.getElementById('isi-tabel');
        listBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Memuat data...</td></tr>';

        const { data, error } = await supabaseClient
            .from('konten_goona')
            .select('*')
            .order('created_at', { ascending: false });

        if(error) { alert('Gagal: ' + error.message); return; }

        listBody.innerHTML = '';
        data.forEach(item => {
            const tr = document.createElement('tr');
            const cleanTitle = (item.judul || '-').replace(/'/g, "\\'");
            const cleanDesc = (item.deskripsi || '').replace(/'/g, "\\'");
            const waNum = item.whatsapp || '-';

            // Logika Klik WhatsApp: Hapus karakter non-angka
            const waKlik = waNum.replace(/\D/g, '');
            const waFinal = waKlik.startsWith('0') ? '62' + waKlik.slice(1) : waKlik;

            tr.innerHTML = `
                <td class="text-left"><b>${item.judul || '-'}</b></td>
                <td class="text-center">
                    <a href="https://wa.me/${waFinal}" target="_blank" class="wa-link">${waNum}</a>
                </td>
                <td class="text-center" style="color:${item.status === 'aktif' ? 'green' : 'orange'}; font-weight:bold">
                    ${item.status.toUpperCase()}
                </td>
                <td class="text-center">
                    <div style="display:flex; gap:5px; justify-content:center;">
                        ${item.status === 'pending' ? `<button onclick="aksiAktifkan('${item.id}')" class="btn btn-ok">OK</button>` : ''}
                        <button onclick="aksiEdit('${item.id}', '${cleanDesc}', '${waNum}')" class="btn btn-edit">Edit</button>
                        <button onclick="aksiHapus('${item.id}')" class="btn btn-hapus">Delete</button>
                    </div>
                </td>
            `;
            listBody.appendChild(tr);
        });
    }

    window.aksiAktifkan = async (id) => {
        await supabaseClient.from('konten_goona').update({ status: 'aktif' }).eq('id', id);
        panggilDatabase();
    };

    window.aksiHapus = async (id) => {
        if(confirm('Hapus data?')) {
            await supabaseClient.from('konten_goona').delete().eq('id', id);
            panggilDatabase();
        }
    };

    window.aksiEdit = async (id, dOld, wOld) => {
        const dNew = prompt("Ubah Deskripsi:", dOld);
        const wNew = prompt("Ubah WhatsApp:", wOld);
        if(dNew !== null && wNew !== null) {
            await supabaseClient.from('konten_goona').update({ deskripsi: dNew, whatsapp: wNew }).eq('id', id);
            panggilDatabase();
        }
    };
</script>
</body>
</html>
