<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Goona Admin - Final Stable</title>
    <link rel="icon" type="image/png" href="Pavicon_goona.png">
    <style>
        :root { 
            --primary: #8B4513; 
            --secondary-brown: #A0522D;
            --light-brown: #D2B48C;
            --bg: #FDF5E6; 
            --white: #ffffff;
            --danger-red: #d9534f;
            --success-green: #28a745;
            --accent-blue: #3498db;
        }
        
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 15px; 
            color: #3E2723;
        }

        .container { 
            max-width: 1000px; 
            margin: auto; 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(139, 69, 19, 0.1); 
            border: 1px solid var(--light-brown);
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 3px solid var(--primary); 
            padding-bottom: 15px; 
            margin-bottom: 25px; 
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h2 { color: var(--primary); margin: 0; font-size: 24px; }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .metric-card {
            background: var(--white);
            border-radius: 16px;
            padding: 18px;
            box-shadow: 0 4px 12px rgba(139, 69, 19, 0.05);
            border: 1px solid var(--light-brown);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .metric-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            flex-shrink: 0;
        }

        .metric-info { display: flex; flex-direction: column; }
        .metric-value { font-size: 24px; font-weight: bold; color: #3E2723; line-height: 1.2; }
        .metric-label { font-size: 12px; color: #8D6E63; font-weight: 500; }

        .table-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        select {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1.5px solid var(--light-brown);
            background-color: #FFFAF0;
            font-size: 14px;
            color: #3E2723;
            outline: none;
            min-width: 140px;
        }

        .table-wrapper { width: 100%; overflow-x: auto; border-radius: 12px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background-color: var(--primary); color: white; padding: 15px; font-weight: bold; }
        td { padding: 15px; border-bottom: 1px solid #eee; vertical-align: middle; }

        .text-center { text-align: center; }
        .text-left { text-align: left; }

        .btn { padding: 8px 16px; border: none; border-radius: 6px; color: white; cursor: pointer; font-weight: bold; font-size: 13px; transition: transform 0.1s; }
        .btn:active { transform: scale(0.96); }
        .btn-hapus { background: var(--danger-red); }
        .btn-ok { background: var(--success-green); }
        
        .wa-link { color: #25D366; font-weight: bold; text-decoration: none; border-bottom: 1px dashed #25D366; }
        .wa-link:hover { color: #128C7E; }

        #login-panel { text-align: center; padding: 60px 20px; }
        #admin-panel { display: none; }
        input[type="password"] { padding: 12px; width: 260px; border-radius: 8px; border: 1.5px solid var(--light-brown); margin-bottom: 15px; outline: none; background: #FFFAF0; font-size: 16px; text-align: center; }
        input[type="password"]:focus { border-color: var(--primary); background: #fff; }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { padding: 15px; border-radius: 15px; }
            
            .table-controls { width: 100%; flex-direction: column; gap: 8px; }
            select { width: 100%; flex: 1; }

            .table-wrapper { border: none; overflow: visible; }
            table, tbody, tr, td { display: block; width: 100%; }
            thead { display: none; }
            
            tr {
                background: #ffffff;
                border: 1.5px solid var(--light-brown);
                padding: 16px;
                margin-bottom: 15px;
                border-radius: 16px;
                box-shadow: 0 4px 10px rgba(139, 69, 19, 0.04);
            }

            td {
                padding: 8px 0;
                border-bottom: 1px dashed #e2e8f0;
                text-align: left !important;
                display: block;
            }

            td::before {
                content: attr(data-label);
                font-weight: 800;
                color: var(--secondary-brown);
                font-size: 11px;
                text-transform: uppercase;
                display: block;
                margin-bottom: 2px;
                letter-spacing: 0.5px;
            }

            td:last-child {
                border-bottom: none;
                padding-top: 12px;
                display: flex;
                flex-direction: row;
                justify-content: flex-end;
            }
            
            td:last-child::before { display: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="login-panel">
        <h2 style="color:var(--primary); margin-bottom: 20px;">Admin Goona AI</h2>
        <input type="password" id="input-password" placeholder="Masukkan Password">
        <br>
        <button id="btn-login-action" class="btn" style="background:var(--primary); padding: 12px 60px; border-radius: 8px;">MASUK</button>
    </div>

    <div id="admin-panel">
        <div class="header">
            <h2>Dashboard Utama Admin</h2>
            <button id="btn-refresh" class="btn" style="background:#444; border-radius: 8px;">🔄 Refresh Data</button>
        </div>

        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-icon" style="background: var(--accent-blue);">📋</div>
                <div class="metric-info">
                    <span class="metric-value" id="stat-total">0</span>
                    <span class="metric-label" id="label-total">Total Terfilter</span>
                </div>
            </div>
            <div class="metric-card">
                <div class="metric-icon" style="background: var(--success-green);">✨</div>
                <div class="metric-info">
                    <span class="metric-value" id="stat-today">0</span>
                    <span class="metric-label">Baru Hari Ini</span>
                </div>
            </div>
            <div class="metric-card">
                <div class="metric-icon" style="background: #e67e22;">👥</div>
                <div class="metric-info">
                    <span class="metric-value" id="stat-visitors">1.240</span>
                    <span class="metric-label">Jumlah Pengunjung</span>
                </div>
            </div>
        </div>

        <div class="table-controls">
            <select id="filter-kategori">
                <option value="ALL">Semua Kategori</option>
                <option value="Jasa">Jasa</option>
                <option value="Loker">Loker</option>
                <option value="Kuliner">Kuliner</option>
                <option value="Jual Beli">Jual Beli</option>
                <option value="Properti">Properti (Sewa/Kos)</option>
                <option value="Wisata">Wisata</option>
                <option value="Info/Pengumuman">Info/Pengumuman</option>
            </select>
            <select id="filter-status">
                <option value="ALL">Semua Status</option>
                <option value="pending">Pending</option>
                <option value="aktif">Aktif</option>
            </select>
            <select id="filter-kabupaten">
                <option value="ALL">Semua Kota/Kab</option>
            </select>
            <select id="filter-kecamatan" disabled>
                <option value="ALL">Semua Kecamatan</option>
            </select>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th class="text-left">Layanan</th>
                        <th class="text-center">WhatsApp</th>
                        <th class="text-center">Status</th>
                        <th class="text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="isi-tabel"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    let supabaseClient;
    let cacheDatabaseData = [];
    const SB_URL = 'https://ejnuelaqlgfcmcqpxmpa.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqbnVlbGFxbGdmY21jcXB4bXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MzIzMjcsImV4cCI6MjA5MzMwODMyN30.32tG2nN1a3cDa6M__qe7PNWG5ZzeF7zs1eDZSxXviNM';

    // PENYESUAIAN 1: DATABASE WILAYAH KEPULAUAN RIAU SUDAH LENGKAP 7 KOTA/KABUPATEN
    const dataWilayahAdmin = {
        "Kota Batam": ["Batam Kota", "Batu Ampar", "Batu Aji", "Belakang Padang", "Bengkong", "Bulang", "Galang", "Lubuk Baja", "Nongsa", "Sagulung", "Sei Beduk", "Sekupang"],
        "Kota Tanjungpinang": ["Tanjungpinang Barat", "Tanjungpinang Kota", "Tanjungpinang Timur", "Bukit Bestari"],
        "Kabupaten Bintan": ["Bintan Pesisir", "Bintan Timur", "Bintan Utara", "Gunung Kijang", "Mantang", "Seri Kuala Lobam", "Tambelan", "Teluk Bintan", "Teluk Sebong", "Toapaya"],
        "Kabupaten Karimun": ["Belat", "Buru", "Durai", "Karimun", "Kundur", "Kundur Barat", "Kundur Utara", "Meral", "Meral Barat", "Moro", "Selat Gelam", "Tebing", "Ungar"],
        "Kabupaten Lingga": ["Bakung Serumpun", "Katang Bidare", "Kepulauan Posek", "Lingga", "Lingga Timur", "Lingga Utara", "Pesisir Bukit", "Selayar", "Senayang", "Singkep", "Singkep Barat", "Singkep Pesisir", "Singkep Selatan", "Temiang Pesisir"],
        "Kabupaten Natuna": ["Bunguran Barat", "Bunguran Batubi", "Bunguran Selatan", "Bunguran Tengah", "Bunguran Timur", "Bunguran Timur Laut", "Bunguran Utara", "Midai", "Pulau Laut", "Pulau Panjang", "Pulau Tiga", "Pulau Tiga Barat", "Serasan", "Serasan Timur", "Suak Midai", "Subi"],
        "Kabupaten Kepulauan Anambas": ["Jemaja", "Jemaja Barat", "Jemaja Timur", "Kute Siantan", "Palmatak", "Siantan", "Siantan Selatan", "Siantan Tengah", "Siantan Timur", "Siantan Utara"]
    };

    window.onload = () => {
        supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);
        document.getElementById('btn-login-action').onclick = prosesMasuk;
        document.getElementById('input-password').onkeydown = (e) => { if(e.key === 'Enter') prosesMasuk(); };
        document.getElementById('btn-refresh').onclick = panggilDatabase;
        
        document.getElementById('filter-kategori').onchange = saringDanCetakTabel;
        document.getElementById('filter-status').onchange = saringDanCetakTabel;
        document.getElementById('filter-kabupaten').onchange = handleKabupatenChange;
        document.getElementById('filter-kecamatan').onchange = saringDanCetakTabel;

        initFilterWilayah();
    };

    function initFilterWilayah() {
        const kabSel = document.getElementById('filter-kabupaten');
        Object.keys(dataWilayahAdmin).sort().forEach(kab => {
            const opt = document.createElement('option');
            opt.value = kab;
            opt.text = kab;
            kabSel.add(opt);
        });
    }

    function handleKabupatenChange() {
        const kabVal = document.getElementById('filter-kabupaten').value;
        const kecSel = document.getElementById('filter-kecamatan');
        
        kecSel.innerHTML = '<option value="ALL">Semua Kecamatan</option>';
        if(kabVal === 'ALL') {
            kecSel.disabled = true;
        } else {
            kecSel.disabled = false;
            if(dataWilayahAdmin[kabVal]) {
                dataWilayahAdmin[kabVal].sort().forEach(kec => {
                    const opt = document.createElement('option');
                    opt.value = kec;
                    opt.text = kec;
                    kecSel.add(opt);
                });
            }
        }
        saringDanCetakTabel();
    }

    function prosesMasuk() {
        const pass = document.getElementById('input-password').value;
        if(pass === 'goona2026') {
            document.getElementById('login-panel').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            panggilDatabase();
        } else { alert('Password Salah!'); }
    }

    async function panggilDatabase() {
        const listBody = document.getElementById('isi-tabel');
        listBody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:20px;">Memuat data dari server Supabase...</td></tr>';

        const { data, error } = await supabaseClient
            .from('konten_goona')
            .select('*')
            .order('created_at', { ascending: false });

        if(error) { alert('Gagal memuat database: ' + error.message); return; }

        cacheDatabaseData = data || [];
        saringDanCetakTabel();
    }

    function hitungMetriksAnalitik(filteredList) {
        document.getElementById('stat-total').innerText = filteredList.length;

        const hariIni = new Date().toISOString().split('T')[0];
        const pendaftarHariIni = filteredList.filter(item => item.created_at && item.created_at.startsWith(hariIni)).length;
        document.getElementById('stat-today').innerText = pendaftarHariIni;

        let vCount = localStorage.getItem('goonity_visitors') || 1240;
        document.getElementById('stat-visitors').innerText = new Intl.NumberFormat('id-ID').format(vCount);
    }

    function saringDanCetakTabel() {
        const listBody = document.getElementById('isi-tabel');
        listBody.innerHTML = '';

        const filterKat = document.getElementById('filter-kategori').value;
        const filterStat = document.getElementById('filter-status').value;
        const filterKab = document.getElementById('filter-kabupaten').value;
        const filterKec = document.getElementById('filter-kecamatan').value;

        const filtered = cacheDatabaseData.filter(item => {
            const cocokKat = (filterKat === 'ALL' || item.kategori === filterKat);
            const cocokStat = (filterStat === 'ALL' || item.status === filterStat);
            const cocokKab = (filterKab === 'ALL' || item.kabupaten_kota === filterKab);
            const cocokKec = (filterKec === 'ALL' || item.kecamatan === filterKec);
            return cocokKat && cocokStat && cocokKab && cocokKec;
        });

        hitungMetriksAnalitik(filtered);

        if (filtered.length === 0) {
            listBody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#8d6e63; padding:35px; font-weight:600;">Belum ada pendaftaran yang sesuai.</td></tr>';
            return;
        }

        filtered.forEach(item => {
            const tr = document.createElement('tr');
            const waNum = item.whatsapp || '-';
            const waKlik = waNum.replace(/\D/g, '');
            const waFinal = waKlik.startsWith('0') ? '62' + waKlik.slice(1) : waKlik;
            
            let lokasiInfo = item.kabupaten_kota || '-';
            if(item.kecamatan) lokasiInfo += ` (${item.kecamatan})`;

            tr.innerHTML = `
                <td data-label="Layanan" class="text-left">
                    <span style="font-size:16px; font-weight:bold; color:#3E2723;">${item.judul || '-'}</span>
                    <div style="font-size:12px; color:#795548; margin-top:4px; font-weight:500;">${item.kategori || '-'} | ${lokasiInfo}</div>
                </td>
                <td data-label="WhatsApp" class="text-center">
                    <a href="https://wa.me/${waFinal}" target="_blank" class="wa-link">${waNum}</a>
                </td>
                <td data-label="Status" class="text-center" style="color:${item.status === 'aktif' ? 'green' : 'orange'}; font-weight:bold; letter-spacing:0.5px;">
                    ${item.status.toUpperCase()}
                </td>
                <td data-label="Aksi" class="text-center">
                    <div style="display:flex; gap:8px; justify-content:center;">
                        ${item.status === 'pending' ? `<button class="btn btn-ok" data-id="${item.id}">OK</button>` : ''}
                        <button class="btn btn-hapus" data-id="${item.id}">Delete</button>
                    </div>
                </td>
            `;
            listBody.appendChild(tr);
        });

        // PENYESUAIAN 2: PASANG EVENT LISTENERS MODERN (MENJAMIN 100% RESPONSIVE DI LAPTOP & HP)
        ikatPemicuTombolAksi();
    }

    function ikatPemicuTombolAksi() {
        // Ikat Tombol OK (Aktifkan Data)
        document.querySelectorAll('.btn-ok').forEach(tombol => {
            tombol.onclick = async (e) => {
                const idData = e.target.getAttribute('data-id');
                e.target.innerText = "⏳...";
                e.target.disabled = true;
                
                try {
                    const { error } = await supabaseClient
                        .from('konten_goona')
                        .update({ status: 'aktif' })
                        .eq('id', idData);

                    if (error) throw error;
                    panggilDatabase(); // Tarik data baru pasca sukses diaktifkan
                } catch (err) {
                    alert("Gagal mengaktifkan pendaftar!");
                    e.target.innerText = "OK";
                    e.target.disabled = false;
                }
            };
        });

        // Ikat Tombol Delete (Hapus Data Permanen)
        document.querySelectorAll('.btn-hapus').forEach(tombol => {
            tombol.onclick = async (e) => {
                const idData = e.target.getAttribute('data-id');
                if(!confirm('Apakah kawan yakin ingin menghapus data ini secara permanen dari server?')) return;
                
                e.target.innerText = "❌...";
                e.target.disabled = true;

                try {
                    const { error } = await supabaseClient
                        .from('konten_goona')
                        .delete()
                        .eq('id', idData);

                    if (error) throw error;
                    panggilDatabase(); // Muat ulang tabel agar angka metrik langsung berkurang nyata
                } catch (err) {
                    alert("Gagal menghapus data dari server!");
                    e.target.innerText = "Delete";
                    e.target.disabled = false;
                }
            };
        });
    }
</script>
</body>
</html>
